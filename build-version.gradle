/**
 * This script will generate a file src/main/java/resources/version.properties, which contains
 * version information for the use of the spring application.
 *
 * Properties file will contain information with the following structure.
 *
 *   <PROJECT_GROUP>.<PROJECT_NAME>.version=<VERSION>
 *   <PROJECT_GROUP>.<PROJECT_NAME>.commit=<SHORT_HASH>
 *   <PROJECT_GROUP>.<PROJECT_NAME>.build-start-time=<MILLISECOND>
 *
 * Examples:
 *
 *   com.rakuten.felix.auditlog.version=<VERSION>
 *   com.rakuten.felix.auditlog.commit=<SHORT_HASH>
 *   com.rakuten.felix.auditlog.build-start-time=<MILLISECOND>
 */

task generateVersionProperties {
    description = 'Generates version info properties.'
    def resourceDir = sourceSets['main'].resources.getSrcDirs()[0]
    if (!resourceDir.exists() && !resourceDir.mkdirs()) {
        throw new GradleException("Resource directory $resourceDir doesn't exist and can't be created")
    }
    def file = new File(resourceDir, 'version.properties')
    def prefix = 'com.rakuten.felix.application'
    file.text = "${prefix}.version=${version}\n" +
            "${prefix}.commit=${shortHash}\n" +
            "${prefix}.build-start-time=${System.currentTimeMillis()}"

    // Add default version info for Spring Boot Admin
    def defaultAppPropertiesFile = new File(resourceDir, "application.properties")
    defaultAppPropertiesFile.text = "info.version=${project.publishVersion}\n" +
            "spring.boot.admin.client.instance.name=${rootProject.name}"
}

processResources.dependsOn 'generateVersionProperties'

static def getShortHash() {
    return 'git rev-parse --short HEAD'.execute().text.trim()
}