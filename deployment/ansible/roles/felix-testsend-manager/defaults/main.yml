#----------------------------------------------------------------------------
# An 'app_name' value should be the same as Maven artifact.
# It is used in many other places as well.
#----------------------------------------------------------------------------
app_name: "felix-testsend-manager"

#----------------------------------------------------------------------------
# An 'u_app_name' is the app_name with underscore instead of hyphens.
#----------------------------------------------------------------------------
u_app_name: "{{app_name | regex_replace('-', '_')}}"

#----------------------------------------------------------------------------
# Number of instances of this app to be deployed.
#----------------------------------------------------------------------------
app_instances: "{{app_versions['instances']}}"

#----------------------------------------------------------------------------
# Min Port.
#----------------------------------------------------------------------------
port_from: "{{felix_apps[u_app_name]['ports']['from']}}"

#----------------------------------------------------------------------------
# Max Port.
#----------------------------------------------------------------------------
port_to: "{{felix_apps[u_app_name]['ports']['to']}}"

#----------------------------------------------------------------------------
# Max Instances.
#----------------------------------------------------------------------------
max_instances: "{{(port_to | int) - (port_from | int)}}"

#----------------------------------------------------------------------------
# List of ports that are to be deployed on remote host.
#----------------------------------------------------------------------------
ports_deployed: []

#----------------------------------------------------------------------------
# List of versions that are to be deployed on remote host.
#----------------------------------------------------------------------------
versions_deployed: "{{app_versions['deployed']}}"

#----------------------------------------------------------------------------
# Versions that are to be running on remote host.
#----------------------------------------------------------------------------
version_running: "{{app_versions['running']}}"

#----------------------------------------------------------------------------
# Temporary variable which contains custom facts about deployed port,
# or empty object if not defined.
#----------------------------------------------------------------------------
app_facts_port: "{{temp_facts_ansible_local[u_app_name + '_port_' + version_to_deploy] | default([])}}"

#----------------------------------------------------------------------------
# Temporary variable which contains custom facts about deployed versions,
# or empty object if not defined.
#----------------------------------------------------------------------------
app_facts_deployed: "{{temp_facts_ansible_local[u_app_name + '_deployed'] | default([])}}"

#----------------------------------------------------------------------------
# Temporary variable which contains custom facts about running version,
# or empty object if not defined.
#----------------------------------------------------------------------------
temp_facts_app_running: "{{temp_facts_ansible_local[u_app_name + '_running'] | default({})}}"

#----------------------------------------------------------------------------
# File name for storing custom facts about port.
# This file name is tied with custom facts variable name. (See above.)
#----------------------------------------------------------------------------
app_facts_port_file: "{{u_app_name}}_port_{{version_to_deploy}}.fact"

#----------------------------------------------------------------------------
# File name for storing custom facts about deployed versions.
# This file name is tied with custom facts variable name. (See above.)
#----------------------------------------------------------------------------
app_facts_deployed_file: "{{u_app_name}}_deployed.fact"

#----------------------------------------------------------------------------
# File name for storing custom facts about running version.
# This file name is tied with custom facts variable name. (See above.)
#----------------------------------------------------------------------------
app_facts_running_file: "{{u_app_name}}_running.fact"

#----------------------------------------------------------------------------
# TCP port number of AJP connector.
#----------------------------------------------------------------------------
app_port_ajp: "{{felix_apps[u_app_name]['ports']['ajp']}}"

#----------------------------------------------------------------------------
# Java maximum heap memory.
#----------------------------------------------------------------------------
jvm_max_heap_memory: "256m"