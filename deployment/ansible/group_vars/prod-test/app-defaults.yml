env: prod-test

#----------------------------------------------------------------------------
# Default logging level for felix application.
#----------------------------------------------------------------------------
app_log_level: "debug"

#----------------------------------------------------------------------------
# Spring Boot Admin Setting
#----------------------------------------------------------------------------
spring_admin:
  url: "http://wfelix204z.prod.jp.local:{{spring_boot_admin_port}}"
  username: "{{vault['spring_admin']['username']}}"
  password: "{{vault['spring_admin']['password']}}"

#----------------------------------------------------------------------------
# Authentication keys.
#----------------------------------------------------------------------------
felix_auth_keys:
    test_send_manager: "{{vault['auth_keys']['test_send_manager']}}"

#----------------------------------------------------------------------------
# Data store config.
#----------------------------------------------------------------------------
felix_persistence:
  url: "jdbc:mysql://dm-felix301z.prod.jp.local:3301/felix_testsend_manager_test"
  user: "{{vault['db3']['common']['user']}}"
  password: "{{vault['db3']['common']['password']}}"
  show_jpa_query: false

#----------------------------------------------------------------------------
# For creating database.
#----------------------------------------------------------------------------
felix_db:
  db_user: "{{vault['db3']['felix_deploy']['user']}}"
  db_password: "{{vault['db3']['felix_deploy']['password']}}"
  db_name: "felix_testsend_manager_test"
  db_host: "dm-felix301z.prod.jp.local"
  db_port: "3301"

#----------------------------------------------------------------------------
# Proxy config. Used for accessing internal APIs.
#----------------------------------------------------------------------------
felix_proxy:
  default:
    host: "dev-proxy.db.rakuten.co.jp"
    port: 8404

#----------------------------------------------------------------------------
# Messaging broker config.
#----------------------------------------------------------------------------
felix_mq:
  connection:
    addresses:
      - "amqfelix101z.prod.jp.local:5672"
      - "amqfelix102z.prod.jp.local:5672"
      - "amqfelix103z.prod.jp.local:5672"
    user: "{{vault['mq']['user']}}"
    password: "{{vault['mq']['password']}}"
  prefix: "felix-test."
  channels:
    test_send_finished: "test-send-finished"
    test_send_error: "test-send-error"
    kick_test_send: "kick-test-send"
    error_channel: "error"
    publish_notification: "publish-notification"
    send_job_manager: "job-manager-start"

#----------------------------------------------------------------------------
# Internal APIs' URLs.
#----------------------------------------------------------------------------
felix_api:
  campaign_scheduler:
    register_and_get: "http://api.core.felix.prod.jp.local/v1.0/scheduler/single-and-get"
