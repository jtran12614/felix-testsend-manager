env: dev

#----------------------------------------------------------------------------
# Default logging level for felix application.
#----------------------------------------------------------------------------
app_log_level: "debug"

#----------------------------------------------------------------------------
# Spring Boot Admin Setting
#----------------------------------------------------------------------------
spring_admin:
  url: "http://felix-springboot-admin-devrc-8080-dsaid-css-felix.dev-zed2-jpe2.dev.jp.local"
  username: "{{vault['spring_admin']['username']}}"
  password: "{{vault['spring_admin']['password']}}"

#----------------------------------------------------------------------------
# Authentication keys.
#----------------------------------------------------------------------------
felix_auth_keys:
    test_send_manager: "{{vault['auth_keys']['test_send_manager']}}"

#----------------------------------------------------------------------------
# Data store config.
#----------------------------------------------------------------------------
felix_persistence:
  url: "jdbc:mysql://dev-dm-felix201z.dev.jp.local:3301/felix_scenario_01"
  user: "{{vault['db2']['common']['user']}}"
  password: "{{vault['db2']['common']['password']}}"
  show_jpa_query: false

#----------------------------------------------------------------------------
# Proxy config. Used for accessing internal APIs.
#----------------------------------------------------------------------------
felix_proxy:
  default:
    host: "dev-proxy.db.rakuten.co.jp"
    port: 9501

#----------------------------------------------------------------------------
# Messaging broker config.
#----------------------------------------------------------------------------
felix_mq:
  connection:
    addresses:
      - "dev-amqfelix101z.dev.jp.local:5672"
      - "dev-amqfelix102z.dev.jp.local:5672"
      - "dev-amqfelix103z.dev.jp.local:5672"
    user: "{{vault['mq']['user']}}"
    password: "{{vault['mq']['password']}}"
  prefix: "felix."
  channels:
    test_send_finished: "test-send-finished"
    test_send_error: "test-send-error"
    kick_test_send: "kick-test-send"
    error_channel: "error"
    publish_notification: "publish-notification"
    send_job_manager: "job-manager-start"

#----------------------------------------------------------------------------
# Internal APIs' URLs.
#----------------------------------------------------------------------------
felix_api:
  campaign_scheduler:
    register_and_get: "http://api.core.felix.prod.jp.local/v1.0/scheduler/single-and-get"
