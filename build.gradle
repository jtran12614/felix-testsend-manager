plugins {
    id 'org.springframework.boot' version '2.0.0.RELEASE'
    id 'io.spring.dependency-management' version '1.0.3.RELEASE'
    id 'io.franzbecker.gradle-lombok' version '1.11'
    id 'org.sonarqube' version '2.6.2'
    id 'java-library'
    id 'checkstyle'
    id 'findbugs'
    id 'jacoco'
}

ext {
    checkStyleVersion = '7.7'
    jmockitVersion = '1.32'
    junitJupiterVersion = '5.0.0-M4'
    junitPlatformVersion = '1.0.0-M4'
    lombokVersion = '1.16.20'
    springAdminVersion = '2.0.0-SNAPSHOT'
    rabbitVersion = '2.0.1.RELEASE'
    cloudVersion = '1.0.0.RELEASE'
    mockitoVersion = '2.1.0'
}

group 'com.rakuten.felix'
version rootProject.file('version').text.trim()

apply from: 'build-publish.gradle'
apply from: 'build-version.gradle'

tasks.withType(JavaCompile) {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

lombok {
    version = "${lombokVersion}"
}

repositories {
    mavenCentral()
    maven { url 'https://repo.spring.io/libs-release' }
    maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
}

dependencies {
    compile group: 'org.springframework.amqp', name: 'spring-rabbit', version: "${rabbitVersion}"
    compile group: 'org.springframework.cloud', name: 'spring-cloud-stream', version: "${cloudVersion}"
    compile 'org.springframework.boot:spring-boot-starter-data-jpa'
    compile 'org.springframework.retry:spring-retry'
    compile 'mysql:mysql-connector-java'
    compile 'commons-validator:commons-validator:1.5.1'
    compile 'org.springframework.boot:spring-boot-actuator'
    compile("de.codecentric:spring-boot-admin-starter-client:${springAdminVersion}") {
        exclude group: 'junit'
    }
    compile 'com.moelholm:prometheus-spring-boot-starter:1.0.1'
    // JUnit Jupiter API and TestEngine implementation
    testCompile "org.mockito:mockito-core:${mockitoVersion}"
    testImplementation "org.junit.jupiter:junit-jupiter-api:${junitJupiterVersion}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitJupiterVersion}"
    testImplementation "org.junit.platform:junit-platform-launcher:${junitPlatformVersion}"
    testImplementation "org.jmockit:jmockit:${jmockitVersion}"
}

sonarqube {
    properties {
        property "sonar.host.url", "http://dev-qcmdaci101z.dev.jp.local:9000"
        property "sonar.exclusions", "**/resources/version.properties"
    }
}

test {
    useJUnitPlatform()
}

checkstyle {
    toolVersion = '7.7'
}