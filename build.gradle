buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'org.junit.platform:junit-platform-gradle-plugin:1.0.0'
    }
}

plugins {
    id 'java'
    id 'findbugs'
    id 'checkstyle'
    id 'jacoco'
    id 'org.springframework.boot' version '1.5.9.RELEASE'
    id "org.sonarqube" version "2.5"
}

ext.junitJupiterVersion = '5.0.0'
ext.jacocoVersion = '0.7.9'
ext.mockitoVersion = '2.1.0'

group 'com.rakuten.felix'
version '0.1.0'

apply from: 'build-publish.gradle'
apply from: 'build-version.gradle'
apply plugin: 'org.junit.platform.gradle.plugin'

tasks.withType(JavaCompile) {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

repositories {
    mavenCentral()
}

dependencies {
    compile 'org.springframework.cloud:spring-cloud-starter-stream-rabbit'
    compile 'org.springframework.boot:spring-boot-starter-data-jpa'
    compile 'mysql:mysql-connector-java'
    compile 'org.springframework.boot:spring-boot-actuator'
    compile('de.codecentric:spring-boot-admin-starter-client:1.4.+') {
        exclude group: 'junit'
    }
    compile 'com.moelholm:prometheus-spring-boot-starter:1.0.1'
    compileOnly 'org.projectlombok:lombok:1.16.+'
    testCompile "org.mockito:mockito-core:${mockitoVersion}"
    // JUnit Jupiter API and TestEngine implementation
    testCompile("org.junit.jupiter:junit-jupiter-api:${junitJupiterVersion}")
    testRuntime("org.junit.jupiter:junit-jupiter-engine:${junitJupiterVersion}")
    testCompileOnly 'org.projectlombok:lombok:1.16.+'
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework.cloud:spring-cloud-dependencies:Camden.SR6'
    }
}

test {
    useTestNG {
        useDefaultListeners = true
    }
}

sonarqube {
    properties {
        property "sonar.host.url", "http://dev-qcmdaci101z.dev.jp.local:9000"
        property "sonar.exclusions", "**/resources/version.properties"
    }
}

checkstyle {
    toolVersion = '7.6'
}
